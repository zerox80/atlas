name: Source limits

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-limits-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-limits:
    name: Max 500 lines / 120 characters
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python, TypeScript, CSS, and JavaScript sources
        run: python scripts/check_source_limits.py
