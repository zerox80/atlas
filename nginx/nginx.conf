server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS. Using a variable defers backend resolution until a
    # request arrives, so Nginx can start while the backend is still registering.
    resolver 127.0.0.11 valid=30s;
    set $backend_upstream backend:8000;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self';" always;
    
    # Allow multipart overhead above the backend's 10 MiB file limit.
    client_max_body_size 11M;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Strip the public /api prefix before forwarding. With a variable in
        # proxy_pass, the rewrite keeps the remainder of the request URI intact.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        # Preserve a non-default local port so same-origin login checks see the
        # exact browser origin; the public proxy already supplies its canonical host.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        # The public proxy overwrites this header with exactly one client IP.
        # Preserve that trusted value for application audit logs and rate limits.
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        
        # Prevent Caching of API Responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    }
}
