services:
  backend:
    build: ./backend
    container_name: atlas-backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/ze_dashboard.db}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - PRODUCTION=${PRODUCTION:-true}
      - SECURE_COOKIES=${SECURE_COOKIES:-true}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN:-5/minute}
      - RATE_LIMIT_UPLOAD=${RATE_LIMIT_UPLOAD:-20/hour}
      - MAX_UPLOAD_STORAGE_MB=${MAX_UPLOAD_STORAGE_MB:-5120}
      - MAX_UPLOAD_FILES=${MAX_UPLOAD_FILES:-10000}
      - BUSINESS_TIMEZONE=${BUSINESS_TIMEZONE:-Europe/Berlin}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80}
      # Trust proxy headers only from the dedicated Docker network. Keep this in
      # sync with ATLAS_NETWORK_SUBNET when overriding either value.
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-172.30.253.0/24}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MISTRAL_CHAT_MODEL=${MISTRAL_CHAT_MODEL:-mistral-medium-3-5}
      - MISTRAL_OCR_MODEL=${MISTRAL_OCR_MODEL:-mistral-ocr-4-0}
      - MISTRAL_OCR_TABLE_FORMAT=${MISTRAL_OCR_TABLE_FORMAT:-markdown}
      - MISTRAL_OCR_INCLUDE_BLOCKS=${MISTRAL_OCR_INCLUDE_BLOCKS:-true}
      - MISTRAL_OCR_CONFIDENCE_GRANULARITY=${MISTRAL_OCR_CONFIDENCE_GRANULARITY:-page}
      - MISTRAL_MAX_PDF_PAGES=${MISTRAL_MAX_PDF_PAGES:-100}
      - MISTRAL_MAX_OCR_CHARACTERS=${MISTRAL_MAX_OCR_CHARACTERS:-100000}
      - MISTRAL_REQUEST_TIMEOUT_SECONDS=${MISTRAL_REQUEST_TIMEOUT_SECONDS:-120}
      - MISTRAL_DOCUMENT_PROCESSING_ENABLED=${MISTRAL_DOCUMENT_PROCESSING_ENABLED:-true}
    volumes:
      - ./data:/app/data
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), 2).close()"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks:
      - atlas-network

  frontend:
    build: ./frontend
    container_name: atlas-frontend
    restart: always
    ports:
      # Do not publish the application directly to the internet. The external
      # TLS proxy terminates HTTPS and forwards to this loopback-only port.
      - "127.0.0.1:${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - atlas-network

networks:
  atlas-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${ATLAS_NETWORK_SUBNET:-172.30.253.0/24}
