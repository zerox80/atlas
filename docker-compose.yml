services:
  backend:
    build: ./backend
    container_name: atlas-backend
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/ze_dashboard.db}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - PRODUCTION=${PRODUCTION:-false}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - RATE_LIMIT_LOGIN=${RATE_LIMIT_LOGIN:-5/minute}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MISTRAL_CHAT_MODEL=${MISTRAL_CHAT_MODEL:-mistral-medium-3-5}
      - MISTRAL_OCR_MODEL=${MISTRAL_OCR_MODEL:-mistral-ocr-4-0}
      - MISTRAL_OCR_TABLE_FORMAT=${MISTRAL_OCR_TABLE_FORMAT:-markdown}
      - MISTRAL_OCR_INCLUDE_BLOCKS=${MISTRAL_OCR_INCLUDE_BLOCKS:-true}
      - MISTRAL_OCR_CONFIDENCE_GRANULARITY=${MISTRAL_OCR_CONFIDENCE_GRANULARITY:-page}
      - MISTRAL_DOCUMENT_PROCESSING_ENABLED=${MISTRAL_DOCUMENT_PROCESSING_ENABLED:-true}
    volumes:
      - ./data:/app/data
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8000), 2).close()"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    networks:
      - atlas-network

  frontend:
    build: ./frontend
    container_name: atlas-frontend
    restart: always
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - atlas-network

networks:
  atlas-network:
    driver: bridge
